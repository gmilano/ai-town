<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Town</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; color: #eee; font-family: -apple-system, 'Segoe UI', sans-serif; touch-action: none; }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    background: rgba(22,33,62,0.92); backdrop-filter: blur(8px);
    padding: 10px 16px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #0f3460;
  }
  #header h1 { font-size: 17px; color: #e94560; font-weight: 700; }
  #status { font-size: 12px; color: #aaa; display: flex; gap: 10px; flex-wrap: wrap; }
  #status span { color: #4ecca3; font-weight: 600; }

  #canvas-wrap {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: grab;
  }
  #canvas-wrap:active { cursor: grabbing; }
  canvas { display: block; transform-origin: 0 0; }

  /* ── Bottom Sheet ───────────────────────────────────────────── */
  #sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    background: #16213e;
    border-radius: 20px 20px 0 0;
    border-top: 1px solid #0f3460;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    max-height: 72vh; overflow-y: auto;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }
  #sheet.open { transform: translateY(0); }

  #sheet-handle {
    display: flex; justify-content: center; padding: 12px 0 6px;
    cursor: pointer;
  }
  #sheet-handle::after {
    content: ''; width: 40px; height: 4px;
    background: #0f3460; border-radius: 2px;
  }
  #sheet-content { padding: 0 18px 24px; }

  .agent-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .agent-status-line { font-size: 13px; color: #aaa; margin-bottom: 14px; }
  .agent-thought {
    background: #0f3460; border-radius: 10px; padding: 12px;
    font-size: 14px; font-style: italic; color: #ddd; margin-bottom: 18px;
    border-left: 3px solid #4ecca3;
  }
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: #e94560; margin-bottom: 10px; font-weight: 600;
  }
  .memory-item {
    background: #1a1a2e; border-radius: 8px; padding: 10px 12px;
    margin-bottom: 8px; font-size: 13px; color: #ccc;
    border-left: 3px solid #4ecca3;
  }
  .conv-item { background: #1a1a2e; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .conv-msg { font-size: 13px; margin: 4px 0; line-height: 1.4; }
  .conv-msg .speaker { font-weight: 700; }

  /* ── Hint ───────────────────────────────────────────────────── */
  #hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: #ccc; font-size: 12px;
    padding: 8px 16px; border-radius: 20px; pointer-events: none;
    transition: opacity 0.4s; white-space: nowrap;
  }
  #hint.hidden { opacity: 0; }
</style>
</head>
<body>

<div id="header">
  <h1>🏘️ AI Town</h1>
  <div id="status">
    <div><span id="stat-agents">0</span> agents</div>
    <div><span id="stat-talking">0</span> talking</div>
    <div><span id="stat-mem">0</span> memories</div>
  </div>
</div>

<div id="canvas-wrap"></div>

<div id="hint">Tap an agent to see their thoughts</div>

<!-- Bottom sheet -->
<div id="sheet">
  <div id="sheet-handle" onclick="closeSheet()"></div>
  <div id="sheet-content"><div style="color:#666;text-align:center;padding:20px">Loading...</div></div>
</div>

<script>
const WORLD = 26, TILE = 32, CSIZE = WORLD * TILE;
const COLORS = { f1:0xFFD700, f2:0xFF6B6B, f3:0x9B59B6, f4:0x27AE60, f5:0x3498DB, f6:0xE74C3C, f7:0xF39C12, f8:0x1ABC9C };
const CSSCOLORS = { f1:'#FFD700', f2:'#FF6B6B', f3:'#9B59B6', f4:'#27AE60', f5:'#3498DB', f6:'#E74C3C', f7:'#F39C12', f8:'#1ABC9C' };

// ── Pixi setup ──────────────────────────────────────────────────
const app = new PIXI.Application({ width: CSIZE, height: CSIZE, backgroundColor: 0x3d7a3d, antialias: true, resolution: window.devicePixelRatio || 1, autoDensity: true });
document.getElementById('canvas-wrap').appendChild(app.view);
app.view.style.touchAction = 'none';

// ── Pan + pinch-to-zoom ─────────────────────────────────────────
let scale = 1, offsetX = 0, offsetY = 0;
let dragging = false, lastX = 0, lastY = 0;
let pinchDist = 0;

function applyTransform() {
  app.view.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}

function fitToScreen() {
  const wrap = document.getElementById('canvas-wrap');
  scale = Math.min(wrap.clientWidth / CSIZE, (wrap.clientHeight - 50) / CSIZE);
  offsetX = (wrap.clientWidth - CSIZE * scale) / 2;
  offsetY = 50 + (wrap.clientHeight - 50 - CSIZE * scale) / 2;
  applyTransform();
}
fitToScreen();
window.addEventListener('resize', fitToScreen);

// Touch events for pan + pinch
const wrap = document.getElementById('canvas-wrap');
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
  if (e.touches.length === 2) { pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
}, { passive: true });

wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    offsetX += e.touches[0].clientX - lastX;
    offsetY += e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    applyTransform();
  }
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const delta = d / pinchDist;
    scale = Math.min(3, Math.max(0.3, scale * delta));
    pinchDist = d;
    applyTransform();
  }
}, { passive: true });

wrap.addEventListener('touchend', () => { dragging = false; });

// Mouse pan
wrap.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
wrap.addEventListener('mousemove', e => { if (!dragging) return; offsetX += e.clientX - lastX; offsetY += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; applyTransform(); });
wrap.addEventListener('mouseup', () => dragging = false);
wrap.addEventListener('wheel', e => { scale = Math.min(3, Math.max(0.3, scale * (e.deltaY < 0 ? 1.1 : 0.9))); applyTransform(); }, { passive: true });

// ── Draw map ────────────────────────────────────────────────────
const mapGfx = new PIXI.Graphics();
for (let x = 0; x < WORLD; x++) for (let y = 0; y < WORLD; y++) {
  mapGfx.beginFill((x+y)%2===0 ? 0x4a7a3a : 0x528a42);
  mapGfx.drawRect(x*TILE, y*TILE, TILE, TILE);
  mapGfx.endFill();
}
// Paths
mapGfx.beginFill(0x8B7355, 0.4);
mapGfx.drawRect(0, 12*TILE, CSIZE, TILE*2);
mapGfx.drawRect(12*TILE, 0, TILE*2, CSIZE);
mapGfx.endFill();
// Pond
mapGfx.beginFill(0x4169E1, 0.7);
mapGfx.drawCircle(5*TILE, 5*TILE, TILE*1.8);
mapGfx.endFill();
// Market
mapGfx.beginFill(0x8B6914, 0.3);
mapGfx.drawRect(17*TILE, 17*TILE, 4*TILE, 4*TILE);
mapGfx.endFill();
app.stage.addChild(mapGfx);

const addLabel = (t, x, y) => {
  const l = new PIXI.Text(t, { fontSize: 9, fill: 0xffffff, alpha: 0.5 });
  l.x = x; l.y = y; app.stage.addChild(l);
};
addLabel('🌊 Pond', 3.2*TILE, 3.5*TILE);
addLabel('🏪 Market', 17.5*TILE, 17.2*TILE);
addLabel('Town Square', 11*TILE, 10.5*TILE);

// ── Agent sprites ───────────────────────────────────────────────
const agentLayer = new PIXI.Container();
app.stage.addChild(agentLayer);
const sprites = new Map();
let worldState = { agents: [], conversations: [] };
let selectedId = null;
let tick = 0;

function getSprite(agent) {
  if (sprites.has(agent.id)) return sprites.get(agent.id);
  const c = new PIXI.Container();
  c.interactive = true; c.cursor = 'pointer';

  // Shadow
  const sh = new PIXI.Graphics();
  sh.beginFill(0x000000, 0.2); sh.drawEllipse(0, 16, 12, 4); sh.endFill();
  c.addChild(sh);

  // Body circle
  const circle = new PIXI.Graphics();
  const col = COLORS[agent.character] || 0xFFFFFF;
  circle.beginFill(col); circle.drawCircle(0, 0, 16); circle.endFill();
  circle.lineStyle(2, 0xffffff, 0.5); circle.drawCircle(0, 0, 16);
  c.addChild(circle);

  // Letter
  const letter = new PIXI.Text(agent.name[0], { fontSize: 13, fill: 0xffffff, fontWeight: 'bold' });
  letter.anchor.set(0.5); c.addChild(letter);

  // Name tag
  const tag = new PIXI.Text(agent.name, { fontSize: 9, fill: 0xffffff, stroke: 0x000000, strokeThickness: 3 });
  tag.anchor.set(0.5); tag.y = 25; c.addChild(tag);

  // Selection ring
  const ring = new PIXI.Graphics();
  ring.lineStyle(3, 0xFFFFFF); ring.drawCircle(0, 0, 21); ring.visible = false;
  c.addChild(ring); c._ring = ring;

  // Speech bubble
  const bub = new PIXI.Container();
  const bg = new PIXI.Graphics();
  bg.beginFill(0x000000, 0.8); bg.drawRoundedRect(-65, -52, 130, 32, 8); bg.endFill();
  bg.beginFill(0x000000, 0.8); bg.drawPolygon([-5,-21, 5,-21, 0,-14]); bg.endFill();
  const bt = new PIXI.Text('', { fontSize: 9, fill: 0xffffff, wordWrap: true, wordWrapWidth: 118, align: 'center' });
  bt.anchor.set(0.5); bt.y = -36;
  bub.addChild(bg, bt); bub._t = bt; bub.visible = false;
  c.addChild(bub); c._bub = bub;

  c.on('pointerdown', () => onAgentTap(agent.id));
  agentLayer.addChild(c);
  sprites.set(agent.id, c);
  c.x = agent.x * TILE; c.y = agent.y * TILE;
  return c;
}

function update(state) {
  tick++;
  worldState = state;

  // Stats
  document.getElementById('stat-agents').textContent = state.agents.length;
  document.getElementById('stat-talking').textContent = state.agents.filter(a => a.status === 'talking').length;

  for (const a of state.agents) {
    const s = getSprite(a);
    const tx = a.x * TILE, ty = a.y * TILE;
    s.x += (tx - s.x) * 0.25;
    s.y += (ty - s.y) * 0.25;
    if (a.status === 'walking') s.y += Math.sin(tick * 0.35) * 2;
    if (a.status === 'talking') { const sc = 1 + Math.sin(tick * 0.12) * 0.07; s.scale.set(sc); }
    else s.scale.set(1);
    s._ring.visible = (a.id === selectedId);

    // Speech bubble — find this agent's conversation
    const conv = state.conversations.find(c => c.agent1 === a.name || c.agent2 === a.name);
    if (conv && conv.messages && conv.messages.length > 0) {
      const lastMsg = conv.messages[conv.messages.length - 1];
      const text = (lastMsg.text || '').substring(0, 55) + (lastMsg.text?.length > 55 ? '…' : '');
      if (text !== s._bub._t.text) s._bub._t.text = text;
      s._bub.visible = true;
    } else {
      s._bub.visible = false;
    }
  }

  if (selectedId) refreshSheetLive(selectedId, state);
}

// ── Agent tap ───────────────────────────────────────────────────
let hintHidden = false;
async function onAgentTap(id) {
  selectedId = id;
  sprites.forEach((s, sid) => s._ring.visible = sid === id);
  if (!hintHidden) { document.getElementById('hint').classList.add('hidden'); hintHidden = true; }
  openSheet();
  await loadAgentSheet(id);
}

function openSheet() {
  document.getElementById('sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  selectedId = null;
  sprites.forEach(s => s._ring.visible = false);
}

function refreshSheetLive(id, state) {
  const a = state.agents.find(x => x.id === id);
  if (!a) return;
  const el = document.getElementById('live-thought');
  if (el && a.thought) el.textContent = `"${a.thought}"`;
  const sl = document.getElementById('live-status');
  if (sl) sl.textContent = `${a.status} ${a.status==='talking'?'💬':a.status==='walking'?'🚶':'💤'}`;

  // Update active conv in sheet
  const conv = state.conversations.find(c => c.agent1 === a.name || c.agent2 === a.name);
  const cEl = document.getElementById('live-conv');
  if (cEl && conv && conv.messages?.length) {
    const color = CSSCOLORS[a.character] || '#fff';
    let html = `<div class="section-title">💬 Now talking</div><div class="conv-item">`;
    for (const m of conv.messages.slice(-4)) {
      const isSelf = m.name === a.name;
      html += `<div class="conv-msg"><span class="speaker" style="color:${isSelf ? color : '#aaa'}">${m.name}:</span> ${m.text || ''}</div>`;
    }
    html += `</div>`;
    cEl.innerHTML = html;
  }
}

async function loadAgentSheet(id) {
  const content = document.getElementById('sheet-content');
  content.innerHTML = '<div style="color:#666;text-align:center;padding:20px">Loading...</div>';
  try {
    const res = await fetch(`/api/agent/${id}`);
    const { agent, memories, conversations } = await res.json();
    const color = CSSCOLORS[agent.character] || '#fff';
    const liveAgent = worldState.agents.find(a => a.id === id);
    const status = liveAgent?.status || agent.status;

    let html = `
      <div class="agent-name" style="color:${color}">${agent.name}</div>
      <div class="agent-status-line" id="live-status">${status} ${status==='talking'?'💬':status==='walking'?'🚶':'💤'}</div>
      <div class="agent-thought" id="live-thought">"${agent.current_thought || 'Just hanging around...'}"</div>
      <div id="live-conv"></div>
    `;

    if (memories.length) {
      html += `<div class="section-title">🧠 Memories (${memories.length})</div>`;
      for (const m of memories.slice(0, 5))
        html += `<div class="memory-item">${m.description}</div>`;
    }

    if (conversations.length) {
      html += `<div class="section-title" style="margin-top:16px">📜 Past conversations</div>`;
      for (const c of conversations.slice(0, 3)) {
        html += `<div class="conv-item">`;
        for (const m of (c.messages || []).slice(0, 4))
          html += `<div class="conv-msg"><span class="speaker" style="color:${m.name===agent.name?color:'#aaa'}">${m.name}:</span> ${m.text||''}</div>`;
        html += `</div>`;
      }
    }

    content.innerHTML = html;
    // Apply live state
    refreshSheetLive(id, worldState);
  } catch (e) {
    content.innerHTML = '<div style="color:#e94560;padding:20px">Error loading agent data</div>';
  }
}

// ── Socket ──────────────────────────────────────────────────────
const socket = io();
socket.on('worldState', update);
fetch('/api/world').then(r => r.json()).then(update).catch(console.error);

// Auto-refresh selected agent panel every 10s
setInterval(() => { if (selectedId) loadAgentSheet(selectedId); }, 10000);

// Count total memories for stat
setInterval(async () => {
  try {
    const w = await fetch('/api/world').then(r => r.json());
    const talking = w.agents.filter(a => a.status === 'talking').length;
    document.getElementById('stat-talking').textContent = talking;
  } catch {}
}, 5000);
</script>
</body>
</html>
